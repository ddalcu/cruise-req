    # ── Servicing Request DTOs ──────────────────────────────────────────
    BookingApplyPricingRulesRequest:
      type: object
      properties:
        SailingProperties:
          $ref: '#/components/schemas/SailingProperties'
        CruisePrice:
          $ref: '#/components/schemas/CruisePrice'
        memberProperties:
          type: object

    SailingProperties:
      type: object
      properties:
        cruiseLineRecno: {type: string}
        shipRecno: {type: string}
        destinationRecno: {type: string}
        departurePortRecno: {type: string}
        duration: {type: string}
        sailingRecno: {type: string}
        bookingDate: {type: string}
        sailingDate: {type: string}

    CruisePrice:
      type: object
      properties:
        categoryGroupRecno: {type: string}
        fareCodeTypePrice: {type: string}
        fareCodeTypeCost: {type: string}
        certificateRedemptionFee: {type: number, format: double}
        pointRedemptionFee: {type: number, format: double}
        processingFee: {type: number, format: double}
        passengerFareList:
          type: array
          items:
            $ref: '#/components/schemas/PassengerFare'

    PassengerFare:
      type: object
      properties:
        passengerNumber: {type: integer}
        cruiseFare: {type: number, format: double}
        cost: {type: number, format: double}
        nccf: {type: number, format: double}
        nccfCost: {type: number, format: double}
        governmentFees: {type: number, format: double}
        governmentFeesCost: {type: number, format: double}
        currencyRecno: {type: integer}

    # ── Health ──────────────────────────────────────────────────────────
    PlatformDependencyRoot:
      type: object
      properties:
        status:
          type: string
          enum: [Healthy, Degraded, Unhealthy]
        totalDuration:
          type: string
        entries:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PlatformDependency'

    PlatformDependency:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        duration:
          type: string
        status:
          type: string
          enum: [Healthy, Degraded, Unhealthy]
        tags:
          type: array
          items:
            type: string
