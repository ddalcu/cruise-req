    SearchOptionShip:
      type: object
      properties:
        id: {type: integer}
        name: {type: string}
        isAvailable: {type: boolean}
        isSelected: {type: boolean}
        isDisabled: {type: boolean}

    SearchOptionPort:
      type: object
      properties:
        id: {type: integer}
        name: {type: string}
        isAvailable: {type: boolean}
        isSelected: {type: boolean}
        isDisabled: {type: boolean}

    SearchOptionDuration:
      type: object
      properties:
        id: {type: integer}
        name: {type: string}
        isAvailable: {type: boolean}
        isSelected: {type: boolean}
        isDisabled: {type: boolean}

    DynamicSearch:
