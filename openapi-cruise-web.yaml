openapi: 3.0.3
info:
  title: Arrivia Cruise WebApi
  description: >
    BFF (Backend for Frontend) API for the Arrivia Cruise booking platform.
    Proxies and orchestrates calls to the Java cruise-core backend, membership services,
    payment gateways, and other internal systems.
  version: 1.0.0
  contact:
    name: Arrivia Engineering

servers:
  - url: https://{host}
    variables:
      host:
        default: localhost:5001

security:
  - apiKey: []
  - bearer: []

tags:
  - name: Auth
    description: Token acquisition
  - name: Search
    description: Cruise search and search matrix
  - name: Details
    description: Cruise detail information
  - name: Itinerary
    description: Itinerary details
  - name: Category
    description: Cabin categories and pricing
  - name: Cabin
    description: Cabin selection and hold
  - name: Guest
    description: Guest information management
  - name: FeaturesAndOptions
    description: Dining, services, insurance
  - name: Payment
    description: Payment processing and confirmation
  - name: Quote
    description: Email quote
  - name: Member
    description: Member configuration and customer data
  - name: Utility
    description: Static lists, display options, configuration
  - name: EntryPoint
    description: SSO entry points and redirects
  - name: ExternalContent
    description: External HTML content proxy

paths:
  # ── Auth ──────────────────────────────────────────────────────────────
  /api/auth/get-access-token:
    post:
      operationId: getAccessToken
      tags: [Auth]
      summary: Get an Azure AD access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AzureApp'
      responses:
        '200':
          description: Token returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  # ── Search ────────────────────────────────────────────────────────────
  /api/search/get-search-results:
    get:
      operationId: getSearchResults
      tags: [Search]
      summary: Search for cruise sailings
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - $ref: '#/components/parameters/pin'
        - {name: languageId, in: query, schema: {type: integer, default: 1}}
        - {name: customerId, in: query, schema: {type: string}}
        - {name: cruiseLineList, in: query, schema: {type: string}}
        - {name: destinationList, in: query, schema: {type: string}}
        - {name: startDate, in: query, schema: {type: string}}
        - {name: date, in: query, schema: {type: string}}
        - {name: endDate, in: query, schema: {type: string}}
        - {name: specificDate, in: query, schema: {type: string}}
        - {name: shipId, in: query, schema: {type: string}}
        - {name: departurePortId, in: query, schema: {type: string}}
        - {name: itineraryRecno, in: query, schema: {type: string}}
        - {name: certRec, in: query, schema: {type: string}}
        - {name: durationStart, in: query, schema: {type: string}}
        - {name: durationEnd, in: query, schema: {type: string}}
        - {name: specialOfferId, in: query, schema: {type: string}}
        - {name: specialOfferId2, in: query, schema: {type: string}}
        - {name: specialOfferId3, in: query, schema: {type: string}}
        - {name: specialOfferProviderId, in: query, schema: {type: string}}
        - {name: specialOfferProviderId2, in: query, schema: {type: string}}
        - {name: specialOfferProviderId3, in: query, schema: {type: string}}
        - {name: primarySort, in: query, schema: {type: string}}
        - {name: primarySortOrder, in: query, schema: {type: string}}
        - {name: secondarySort, in: query, schema: {type: string}}
        - {name: secondarySortOrder, in: query, schema: {type: string}}
        - {name: numberOfRecords, in: query, schema: {type: integer, default: 0}}
        - {name: fromApplication, in: query, schema: {type: integer, default: 0}}
        - {name: searchId, in: query, schema: {type: string}}
        - {name: childDestinationList, in: query, schema: {type: string}}
        - {name: storeType, in: query, schema: {type: string}}
        - {name: namex, in: query, schema: {type: string}}
        - {name: hasDefaultDestinationListSet, in: query, schema: {type: boolean, default: false}}
        - {name: sId, in: query, schema: {type: integer, default: 0}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuest, in: query, schema: {type: boolean, default: false}}
        - {name: bonusOfferIds, in: query, schema: {type: string}}
        - {name: durationList, in: query, schema: {type: string}}
        - {name: portList, in: query, schema: {type: string}}
        - {name: shipList, in: query, schema: {type: string}}
        - {name: offset, in: query, schema: {type: string}}
        - {name: isDri, in: query, schema: {type: boolean, default: false}}
        - {name: displayType, in: query, schema: {type: string, default: dbc}}
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  searchResults:
                    $ref: '#/components/schemas/CruiseSearchResponse'
                  arriviaState:
                    type: string

  /api/search/get-search-matrix-lite:
    get:
      operationId: getSearchMatrixLite
      tags: [Search]
      summary: Lightweight search matrix (cruise lines, destinations, dates)
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: partnerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: applicationId, in: query, schema: {type: string}}
        - {name: store, in: query, schema: {type: string}}
        - {name: cert, in: query, schema: {type: string}}
        - {name: auth, in: query, schema: {type: string}}
      responses:
        '200':
          description: Matrix lite result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMatrixLiteResult'

  /api/search/get-search-matrix:
    get:
      operationId: getSearchMatrix
      tags: [Search]
      summary: Full search matrix with ships, ports, durations
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: partnerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: applicationId, in: query, schema: {type: string}}
        - {name: store, in: query, schema: {type: string}}
        - {name: cert, in: query, schema: {type: string}}
        - {name: auth, in: query, schema: {type: string}}
      responses:
        '200':
          description: Full matrix result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMatrixResult'

  /api/search/get-search-matrix-items:
    get:
      operationId: getSearchMatrixItems
      tags: [Search]
      summary: Search matrix items (CORS-enabled, JWT-validated)
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: partnerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: applicationId, in: query, schema: {type: string}}
        - {name: store, in: query, schema: {type: string}}
        - {name: cert, in: query, schema: {type: string}}
        - {name: auth, in: query, schema: {type: string}}
      responses:
        '200':
          description: Matrix items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMatrixResult'

  # ── Details ───────────────────────────────────────────────────────────
  /api/details/get-cruise-details:
    get:
      operationId: getCruiseDetailsGet
      tags: [Details]
      summary: Get cruise sailing details (query params)
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - $ref: '#/components/parameters/pin'
        - {name: customerId, in: query, schema: {type: string}}
        - {name: sailingRecno, in: query, schema: {type: string}}
        - {name: gds, in: query, schema: {type: string}}
        - {name: adults, in: query, schema: {type: integer, default: 2}}
        - {name: children, in: query, schema: {type: integer, default: 0}}
        - {name: seniors, in: query, schema: {type: integer, default: 0}}
        - {name: infants, in: query, schema: {type: integer, default: 0}}
        - {name: namex, in: query, schema: {type: string}}
        - {name: language, in: query, schema: {type: integer, default: 1}}
        - {name: certRecno, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
      responses:
        '200':
          description: Cruise details
          content:
            application/json:
              schema:
                type: object
                properties:
                  cruiseDetails:
                    $ref: '#/components/schemas/CruiseDetailsResponse'
                  arriviaState:
                    type: string
    post:
      operationId: getCruiseDetailsPost
      tags: [Details]
      summary: Get cruise sailing details (JSON body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CruiseDetailsRequest'
      responses:
        '200':
          description: Cruise details
          content:
            application/json:
              schema:
                type: object
                properties:
                  cruiseDetails:
                    $ref: '#/components/schemas/CruiseDetailsResponse'
                  arriviaState:
                    type: string

  # ── Itinerary ─────────────────────────────────────────────────────────
  /api/itinerary/get-itinerary-details:
    get:
      operationId: getItineraryDetails
      tags: [Itinerary]
      summary: Get sailing itinerary
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: affiliatePin, in: query, schema: {type: string}}
        - {name: customerId, in: query, schema: {type: string}}
        - {name: sailingId, in: query, schema: {type: string}}
        - {name: certRec, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuest, in: query, schema: {type: boolean, default: false}}
        - {name: isDri, in: query, schema: {type: boolean, default: false}}
        - {name: displayType, in: query, schema: {type: string, default: dbc}}
      responses:
        '200':
          description: Itinerary details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItineraryResponse'

  /api/itinerary/get-itinerary-details-by-day:
    get:
      operationId: getItineraryDetailsByDay
      tags: [Itinerary]
      summary: Get itinerary broken down by day
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: affiliatePin, in: query, schema: {type: string}}
        - {name: customerId, in: query, schema: {type: string}}
        - {name: sailingId, in: query, schema: {type: string}}
        - {name: certRec, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuest, in: query, schema: {type: boolean, default: false}}
        - {name: isDri, in: query, schema: {type: boolean, default: false}}
        - {name: displayType, in: query, schema: {type: string, default: dbc}}
        - {name: namex, in: query, schema: {type: string}}
      responses:
        '200':
          description: Itinerary details by day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItineraryResponse'

  # ── Category ──────────────────────────────────────────────────────────
  /api/category/get-categories:
    get:
      operationId: getCategories
      tags: [Category]
      summary: Get cabin categories and pricing for a sailing
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - $ref: '#/components/parameters/pin'
        - {name: customerId, in: query, schema: {type: string}}
        - {name: recno, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - {name: adults, in: query, schema: {type: integer, default: 0}}
        - {name: children, in: query, schema: {type: integer, default: 0}}
        - {name: seniors, in: query, schema: {type: integer, default: 0}}
        - {name: infants, in: query, schema: {type: integer, default: 0}}
        - {name: certRec, in: query, schema: {type: string}}
        - {name: displayType, in: query, schema: {type: string, default: dbc}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuestCheckOutMode, in: query, schema: {type: boolean, default: false}}
        - {name: isDri, in: query, schema: {type: boolean, default: false}}
        - {name: namex, in: query, schema: {type: string}}
        - {name: nameId, in: query, schema: {type: string}}
      responses:
        '200':
          description: Category response
          content:
            application/json:
              schema:
                type: object
                properties:
                  categoryResponse:
                    $ref: '#/components/schemas/CategoryResponse'
                  arriviaState:
                    type: string
                  sessionId:
                    type: string

  # ── Cabin ─────────────────────────────────────────────────────────────
  /api/cabin/get-cabin-details:
    get:
      operationId: getCabinDetails
      tags: [Cabin]
      summary: Get available cabins for a category
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: customerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: isGalileo, in: query, schema: {type: boolean}}
        - {name: specialRecno, in: query, schema: {type: string}}
        - {name: bookingFare, in: query, schema: {type: string}}
        - {name: bookingFareCodeType, in: query, schema: {type: string}}
        - {name: pricingFareCode, in: query, schema: {type: string}}
        - {name: pricingFareCodeType, in: query, schema: {type: string}}
        - {name: originalPricingFareCode, in: query, schema: {type: string}}
        - {name: categoryRecno, in: query, schema: {type: string}}
        - {name: cruiseLineRecno, in: query, schema: {type: string}}
        - {name: numberOfAdults, in: query, schema: {type: string}}
        - {name: numberOfChildren, in: query, schema: {type: string}}
        - {name: numberOfSeniors, in: query, schema: {type: string}}
        - {name: numberOfInfants, in: query, schema: {type: string}}
        - {name: price, in: query, schema: {type: number, format: double}}
        - {name: originalCruiseFare, in: query, schema: {type: number, format: double}}
        - {name: discount, in: query, schema: {type: number, format: double}}
        - {name: namex, in: query, schema: {type: string}}
        - {name: typeOfPurchase, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - {name: certRec, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: diningSeatingCode, in: query, schema: {type: integer}}
        - {name: diningStatusCode, in: query, schema: {type: integer}}
        - {name: bookingGroupId, in: query, schema: {type: string}}
        - {name: bookingCategoryRequestSequenceNumber, in: query, schema: {type: string}}
        - {name: pricingGroupId, in: query, schema: {type: string}}
        - {name: pricingCategoryRequestSequenceNumber, in: query, schema: {type: string}}
        - {name: isGuestCheckOutMode, in: query, schema: {type: boolean}}
        - {name: cruiseSessionRecno, in: query, schema: {type: string}}
        - {name: nameId, in: query, schema: {type: string}}
      responses:
        '200':
          description: Cabin details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CabinDetails'

  /api/cabin/get-cabin-content:
    get:
      operationId: getCabinContent
      tags: [Cabin]
      summary: Get cabin content/images
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - $ref: '#/components/parameters/pin'
        - {name: categoryRecno, in: query, schema: {type: string}}
        - {name: specialRecno, in: query, schema: {type: string}}
        - {name: customerId, in: query, schema: {type: string}}
      responses:
        '200':
          description: Cabin content
          content:
            application/json:
              schema:
                type: object

  /api/cabin/set-cabin-on-hold:
    post:
      operationId: setCabinOnHold
      tags: [Cabin]
      summary: Place a cabin on hold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CabinOnHoldRequest'
      responses:
        '200':
          description: Cabin hold result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CabinOnHoldResponse'

  # ── Guest ─────────────────────────────────────────────────────────────
  /api/guest/get-guests:
    get:
      operationId: getGuests
      tags: [Guest]
      summary: Get guest information for a booking session
      parameters:
        - {name: customerId, in: query, schema: {type: string}}
        - {name: cruiseSessionRecno, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: namex, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuestCheckOutMode, in: query, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Guest data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestsResponse'

  /api/guest/save-guests:
    post:
      operationId: saveGuests
      tags: [Guest]
      summary: Save guest details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveGuestsRequest'
      responses:
        '200':
          description: Save result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveGuestsResponse'

  /api/guest/validate-third-party-id:
    get:
      operationId: validateThirdPartyId
      tags: [Guest]
      summary: Validate a third-party agent ID
      parameters:
        - $ref: '#/components/parameters/thirdPartyId'
        - $ref: '#/components/parameters/cobrandId'
        - $ref: '#/components/parameters/pin'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateThirdPartyIdResponse'

  # ── Features & Options ────────────────────────────────────────────────
  /api/features-and-options/get-features-and-options:
    get:
      operationId: getFeaturesAndOptions
      tags: [FeaturesAndOptions]
      summary: Get dining preferences and special services
      parameters:
        - {name: pcc, in: query, schema: {type: string}}
        - {name: rateCode, in: query, schema: {type: string}}
        - {name: paxCount, in: query, schema: {type: integer, default: 0}}
        - {name: confirmationNumber, in: query, schema: {type: string}}
        - {name: sid, in: query, schema: {type: string}}
        - {name: categoryCode, in: query, schema: {type: string}}
        - {name: cabinNumber, in: query, schema: {type: string}}
        - {name: upgradeCode, in: query, schema: {type: string}}
        - {name: sailingDate, in: query, schema: {type: string}}
        - {name: sailingDuration, in: query, schema: {type: string}}
        - {name: airCity, in: query, schema: {type: string}}
        - {name: shipCode, in: query, schema: {type: string}}
        - {name: shipRecno, in: query, schema: {type: string}}
        - {name: gdsRecno, in: query, schema: {type: string}}
        - {name: cruiseLineCode, in: query, schema: {type: string}}
        - {name: cruiseLineRecno, in: query, schema: {type: string}}
        - {name: currencyRecno, in: query, schema: {type: string}}
        - {name: langRecno, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: cruiseSessionRecno, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - {name: affiliatePin, in: query, schema: {type: string}}
      responses:
        '200':
          description: Features and options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturesAndOptionsResponse'

  /api/features-and-options/get-insurance-option:
    get:
      operationId: getInsuranceOption
      tags: [FeaturesAndOptions]
      summary: Get insurance pricing
      parameters:
        - {name: cruiseFare, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: affiliatePin, in: query, schema: {type: string}}
        - {name: customerId, in: query, schema: {type: string}}
        - {name: sailingId, in: query, schema: {type: string}}
        - {name: cruiseSessionRecno, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuestCheckOutMode, in: query, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Insurance option
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceOptionResponse'

  /api/features-and-options/save-features-and-options:
    post:
      operationId: saveFeaturesAndOptions
      tags: [FeaturesAndOptions]
      summary: Save selected features and options
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveFeaturesAndOptionsRequest'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object

  # ── Payment ───────────────────────────────────────────────────────────
  /api/payment/get-payment-info:
    get:
      operationId: getPaymentInfo
      tags: [Payment]
      summary: Get payment options, credit card types, amounts
      parameters:
        - $ref: '#/components/parameters/cobrandId'
        - {name: cruiseRecno, in: query, schema: {type: string}}
        - {name: recno, in: query, schema: {type: string}}
        - {name: customerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: insurance, in: query, schema: {type: boolean, default: false}}
        - {name: namex, in: query, schema: {type: string}}
        - {name: tpid, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isGuest, in: query, schema: {type: boolean, default: false}}
        - {name: usingPointsSlider, in: query, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Payment info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInfoResponse'

  /api/payment/get-card-guard-info:
    get:
      operationId: getCardGuardInfo
      tags: [Payment]
      summary: Get stored card information from CardGuard
      parameters:
        - {name: cardGuardToken, in: query, required: true, schema: {type: string}}
        - {name: memberId, in: query, required: true, schema: {type: string}}
        - {name: isCvvRequired, in: query, required: true, schema: {type: boolean}}
      responses:
        '200':
          description: CardGuard info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardGuardInfoResponse'

  /api/payment/process-payment:
    post:
      operationId: processPayment
      tags: [Payment]
      summary: Process a cruise payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: Payment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

  /api/payment/confirm-payment:
    post:
      operationId: confirmPayment
      tags: [Payment]
      summary: Confirm a processed payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentRequest'
      responses:
        '200':
          description: Confirmation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPaymentResponse'

  /api/payment/get-points-info:
    get:
      operationId: getPointsInfo
      tags: [Payment]
      summary: Calculate points redemption values
      parameters:
        - {name: points, in: query, schema: {type: integer, default: 0}}
        - {name: cruiseRecno, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/pin'
        - {name: customerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: savingsAmount, in: query, schema: {type: number, format: double, default: 0}}
        - {name: selectedPaymentOption, in: query, schema: {type: integer, default: 1}}
        - {name: hasPayWithPoints, in: query, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Points info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointsInfo'

  /api/payment/get-payment-schedule:
    get:
      operationId: getPaymentSchedule
      tags: [Payment]
      summary: Get payment schedule breakdown
      parameters:
        - {name: cruiseRecno, in: query, schema: {type: string}}
        - {name: alternativeCurrencyAmount, in: query, schema: {type: number, format: double, default: 0}}
        - {name: savingsAmount, in: query, schema: {type: number, format: double, default: 0}}
        - {name: selectedPaymentOption, in: query, schema: {type: integer, default: 1}}
      responses:
        '200':
          description: Payment schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentScheduleResponse'

  # ── Quote ─────────────────────────────────────────────────────────────
  /api/quote/send:
    post:
      operationId: sendQuote
      tags: [Quote]
      summary: Send an email quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Quote sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  # ── Member ────────────────────────────────────────────────────────────
  /api/member/get-member-configuration:
    get:
      operationId: getMemberConfiguration
      tags: [Member]
      summary: Get member session configuration and cobrand info
      parameters:
        - {name: jwt, in: query, schema: {type: string}}
        - {name: partnerId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: nameId, in: query, schema: {type: string}}
        - {name: affiliatePin, in: query, schema: {type: string}}
        - {name: thirdPartyGuid, in: query, schema: {type: string}}
        - {name: transactionType, in: query, schema: {type: string}}
        - {name: isMembershipToken, in: query, schema: {type: boolean, default: false}}
        - {name: certNumber, in: query, schema: {type: string}}
        - {name: authCode, in: query, schema: {type: string}}
        - {name: certRecno, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
        - {name: isAutenticated, in: query, schema: {type: boolean, default: false}}
        - {name: hasUserSession, in: query, schema: {type: boolean, default: false}}
        - {name: isThirdPartyAdmin, in: query, schema: {type: boolean, default: false}}
        - {name: thirdPartyAgentId, in: query, schema: {type: integer, default: 0}}
        - {name: memberClassId, in: query, schema: {type: string}}
        - {name: defaultNameId, in: query, schema: {type: string}}
        - {name: isSorFromCobrandOption, in: query, schema: {type: boolean, default: false}}
        - {name: cultureCode, in: query, schema: {type: string}}
      responses:
        '200':
          description: Member configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorMessage:
                    type: string

  /api/member/get-customer-data:
    get:
      operationId: getCustomerData
      tags: [Member]
      summary: Get customer data by partner/name ID
      parameters:
        - {name: partnerId, in: query, schema: {type: string}}
        - {name: nameId, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/cobrandId'
        - {name: affiliatePin, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/thirdPartyId'
      responses:
        '200':
          description: Customer data
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerData:
                    $ref: '#/components/schemas/CustomerData'

  # ── Utility ───────────────────────────────────────────────────────────
  /api/utility/get-static-lists:
    get:
      operationId: getStaticLists
      tags: [Utility]
      summary: Get countries, titles, genders for forms
      parameters:
        - $ref: '#/components/parameters/cobrandId'
      responses:
        '200':
          description: Static list data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticLists'

  /api/utility/get-display-options:
    get:
      operationId: getDisplayOptions
      tags: [Utility]
      summary: Get display options for a partner
      parameters:
        - {name: mcId, in: query, required: true, schema: {type: string}}
        - {name: partnerId, in: query, required: true, schema: {type: string}}
        - {name: isSor, in: query, required: true, schema: {type: boolean}}
        - {name: cultureCode, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: Display options
          content:
            application/json:
              schema:
                type: object

  /api/utility/clear-cache:
    get:
      operationId: clearCache
      tags: [Utility]
      summary: Clear server-side cache
      responses:
        '200':
          description: Cache cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/utility/keep-amex-session-alive:
    get:
      operationId: keepAmexSessionAlive
      tags: [Utility]
      summary: Keep an Amex session alive
      parameters:
        - {name: namex, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: Session kept alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmexKeepSessionAliveResponse'

  /api/utility/get-angular-configuration:
    get:
      operationId: getAngularConfiguration
      tags: [Utility]
      summary: Get frontend configuration by URI
      parameters:
        - {name: uri, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: Angular configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AngularConfiguration'

  # ── EntryPoint ────────────────────────────────────────────────────────
  /api/entrypoint:
    get:
      operationId: entryPointGet
      tags: [EntryPoint]
      summary: SSO entry redirect (GET)
      parameters:
        - {name: navTo, in: query, schema: {type: string}}
        - {name: destination, in: query, schema: {type: string}}
        - {name: cruiseline, in: query, schema: {type: string}}
        - {name: date, in: query, schema: {type: string}}
        - {name: dur, in: query, schema: {type: string}}
        - {name: specialofferid, in: query, schema: {type: string}}
        - {name: jwt, in: query, schema: {type: string}}
        - {name: promo, in: query, schema: {type: string}}
        - {name: intLink, in: query, schema: {type: string}}
        - {name: extLink, in: query, schema: {type: string}}
        - {name: linkNav, in: query, schema: {type: string}}
      responses:
        '302':
          description: Redirect to cruise UI

    post:
      operationId: entryPointPost
      tags: [EntryPoint]
      summary: SSO entry redirect (Amex TSLT POST)
      parameters:
        - {name: navTo, in: query, schema: {type: string}}
        - {name: cruiseline, in: query, schema: {type: string}}
        - {name: destination, in: query, schema: {type: string}}
        - {name: date, in: query, schema: {type: string}}
        - {name: dur, in: query, schema: {type: string}}
        - {name: promo, in: query, schema: {type: string}}
        - {name: specialofferid, in: query, schema: {type: string}}
        - {name: returnUrl, in: query, schema: {type: string}}
        - {name: intLink, in: query, schema: {type: string}}
        - {name: extLink, in: query, schema: {type: string}}
        - {name: linkNav, in: query, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '302':
          description: Redirect to cruise UI

  /api/entrypoint/get-amex-token:
    get:
      operationId: getAmexToken
      tags: [EntryPoint]
      summary: Get Amex session JWT
      parameters:
        - {name: sid, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: JWT returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
        '400':
          description: Invalid session

  # ── External Content ──────────────────────────────────────────────────
  /api/external-content/get-html-content:
    get:
      operationId: getHtmlContent
      tags: [ExternalContent]
      summary: Proxy external HTML content (allowlisted URIs only)
      parameters:
        - {name: uri, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: HTML content
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: CruiseWebApiKey
    bearer:
      type: http
      scheme: bearer

  parameters:
    cobrandId:
      name: cobrandId
      in: query
      schema:
        type: string
    pin:
      name: pin
      in: query
      schema:
        type: string
    thirdPartyId:
      name: thirdPartyId
      in: query
      schema:
        type: string

  schemas:
    # ── Request DTOs ──────────────────────────────────────────────────
    AzureApp:
      type: object
      properties:
        appClientId: {type: string}
        appSecret: {type: string}
        appTenantId: {type: string}
        resourceId: {type: string}
        resourceSecret: {type: string}

    CruiseDetailsRequest:
      type: object
      properties:
        cobrandId: {type: string}
        pin: {type: string}
        customerId: {type: string}
        adults: {type: integer}
        seniors: {type: integer}
        children: {type: integer}
        infants: {type: integer}
        sailingRecno: {type: string}
        language: {type: integer}
        storeType: {type: string}
        storeTypeDiscountPercentage: {type: string}
        perPtRateCruise: {type: number, format: float}
        perPtRateDriLuxury: {type: number, format: float}
        gds: {type: boolean}
        discountPercentageLuxury: {type: integer}
        discountPercentageTravel: {type: integer}
        certificateRecno: {type: string}
        thirdPartyId: {type: string}

    CabinOnHoldRequest:
      type: object
      properties:
        cobrandId: {type: string}
        pin: {type: string}
        customerId: {type: string}
        thirdPartyId: {type: string}
        cruiseSessionRecno: {type: string}
        specialRecno: {type: string}
        amexRecNo: {type: string}
        isThirdPartyAdmin: {type: boolean}
        thirdPartyAgentId: {type: string}
        cabinOnHoldPostRequest:
          $ref: '#/components/schemas/CabinOnHoldPostRequest'

    CabinOnHoldPostRequest:
      type: object
      properties:
        cabinnumber: {type: string}
        cabinshiplocation: {type: string}
        deck: {type: string}
        faretype: {type: string}
        cubareasonrecno: {type: integer}

    SaveGuestsRequest:
      type: object
      properties:
        guests:
          type: array
          items:
            $ref: '#/components/schemas/Guest'
        customerId: {type: string}
        cruiseSessionRecno: {type: string}
        cobrandId: {type: string}
        thirdPartyId: {type: string}
        pin: {type: string}

    PaymentRequest:
      type: object
      properties:
        cobrandId: {type: string}
        pin: {type: string}
        customerId: {type: string}
        thirdPartyId: {type: string}
        cruiseSessionRecno: {type: string}
        specialRecno: {type: string}
        usePoints: {type: boolean}
        isGuestCheckOutMode: {type: boolean}
        javaPaymentPostRequest:
          $ref: '#/components/schemas/JavaPaymentPostRequest'
        cardGuardTransactionId: {type: string}

    JavaPaymentPostRequest:
      type: object
      properties:
        paymentTypeId: {type: integer}
        paymenttype: {type: string}
        type: {type: integer}
        address1: {type: string}
        address2: {type: string}
        ccnameoncard: {type: string}
        ccard: {type: string}
        cvv: {type: string}
        city: {type: string}
        ccexpmonth: {type: string}
        ccexpyear: {type: string}
        zip: {type: string}
        countryId: {type: integer}
        countryName: {type: string}
        country: {type: string}
        state_1: {type: string}
        province_7: {type: string}
        province_14: {type: string}
        statetext: {type: string}
        stateId: {type: integer}
        stateAbbreviation: {type: string}
        stateName: {type: string}
        amexRecno: {type: string}
        totalPrice: {type: number, format: double}
        amexPoints: {type: integer}
        amexPointsValue: {type: number, format: double}
        pointsUsed: {type: integer}
        encryptedCard: {type: string}

    ConfirmPaymentRequest:
      type: object
      properties:
        cobrandId: {type: string}
        pin: {type: string}
        customerId: {type: string}
        thirdPartyId: {type: string}
        specialRecno: {type: string}
        cruiseSessionRecno: {type: string}
        isGuestCheckOutMode: {type: boolean}

    QuoteRequest:
      type: object
      properties:
        action: {type: string}
        quoteSearchRequest:
          $ref: '#/components/schemas/QuoteSearchRequest'
        quoteCabinRequest:
          $ref: '#/components/schemas/QuoteCabinRequest'

    QuoteSearchRequest:
      allOf:
        - $ref: '#/components/schemas/BaseQuoteRequest'
        - type: object
          properties:
            pin: {type: string}
            thirdPartyId: {type: string}

    QuoteCabinRequest:
      allOf:
        - $ref: '#/components/schemas/BaseQuoteRequest'
        - type: object
          properties:
            catRecno: {type: string}
            certRec: {type: string}
            bookingFareCode: {type: string}
            pricingFareCode: {type: string}
            bookingFareCodeType: {type: string}
            pricingFareCodeType: {type: string}
            originalPricingFareCode: {type: string}
            processingFees: {type: string}

    BaseQuoteRequest:
      type: object
      properties:
        cobrand: {type: string}
        customerId: {type: string}
        adults: {type: integer}
        children: {type: integer}
        seniors: {type: integer}
        infants: {type: integer}
        recno: {type: string}
        email: {type: string}
        firstName: {type: string}
        lastName: {type: string}
        phoneNumber: {type: string}

    SaveFeaturesAndOptionsRequest:
      type: object
      properties:
        passengerServices:
          type: array
          items:
            $ref: '#/components/schemas/PassengerService'
        wantsInsurance: {type: boolean}
        cruiseSessionRecno: {type: string}
        cobrandId: {type: string}
        numberOfGuests: {type: integer}

    PassengerService:
      type: object
      properties:
        name: {type: string}
        code: {type: string}
        pax: {type: integer}
        value: {type: string}
        desc: {type: string}

    # ── Response DTOs ─────────────────────────────────────────────────
    Advisory:
      type: object
      properties:
        code: {type: string}
        description: {type: string}
        exception: {type: string}
        errorText: {type: string}

    CruiseSearchResponse:
      type: object
      properties:
        cruiseSpecialList:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultItem'
        advisoryList:
          type: array
          items:
            $ref: '#/components/schemas/Advisory'

    SearchResultItem:
      type: object
      properties:
        recno: {type: string}
        cruiseLine: {type: string}
        cruiseLineRecno: {type: string}
        departurePortName: {type: string}
        arrivalPortName: {type: string}
        departurePortRecno: {type: string}
        destinationName: {type: string}
        destinationRecno: {type: string}
        shipName: {type: string}
        shipRecno: {type: string}
        shipRating: {type: number, format: double}
        formattedImages:
          $ref: '#/components/schemas/FormattedImages'
        ports: {type: string}
        dates:
          $ref: '#/components/schemas/Dates'
        duration: {type: string}
        currencyRecno: {type: string}
        cabinPricing:
          type: array
          items:
            $ref: '#/components/schemas/CabinPricing'
        savingsPercentage: {type: string}
        daysOrNights: {type: string}
        daysOrNightsForDisplay: {type: string}
        daysOrNightsPlural: {type: string}
        showBrochureSavingsBadge: {type: boolean}
        specialOfferPageText: {type: string}
        numOfCabinCatWExchange: {type: string}
        isGalileoCruise: {type: boolean}
        itineraryRecno: {type: string}
        sortOrder: {type: integer}
        savings: {type: string}
        savingsSuite: {type: string}
        savingsBalcony: {type: string}
        savingsOutside: {type: string}
        savingsInside: {type: string}
        itineraryName: {type: string}
        purchaseTypes: {type: string}
        gdsRecno: {type: boolean}
        offerList:
          type: array
          items:
            $ref: '#/components/schemas/Offer'

    FormattedImages:
      type: object
      properties:
        ship: {type: string}
        logo: {type: string}

    Dates:
      type: object
      properties:
        depart: {type: string}
        return: {type: string}

    CabinPricing:
      type: object
      properties:
        metaCategory: {type: string}
        price: {type: number, format: double}
        pointsEarned: {type: number, format: double}
        rewardType: {type: string}
        rewardAmount: {type: string}
        rewardText: {type: string}
        rewardCurrencyFormatRecno: {type: string}
        class: {type: string}
        points: {type: integer}

    Offer:
      type: object
      properties:
        id: {type: integer}
        offerTypeId: {type: integer}
        name: {type: string}
        description: {type: string}
        rank: {type: integer}
        image:
          $ref: '#/components/schemas/OfferImage'

    OfferImage:
      type: object
      properties:
        imagePath: {type: string}
        imageType: {type: string}
        description: {type: string}
        fileName: {type: string}
        title: {type: string}

    SearchMatrixLiteResult:
      type: object
      properties:
        cruiseLines:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionCruiseLine'
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionDestination'
        sailingDates:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionSailingDate'
        searchList:
          type: array
          items:
            $ref: '#/components/schemas/DynamicSearch'
        arriviaState: {type: string}

    SearchMatrixResult:
      type: object
      properties:
        cruiseLines:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionCruiseLine'
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionDestination'
        sailingDates:
          type: array
          items:
            $ref: '#/components/schemas/SearchOptionSailingDate'
        searchList:
          type: array
          items:
            type: array
            items:
              type: integer
        arriviaState: {type: string}
        ships:
