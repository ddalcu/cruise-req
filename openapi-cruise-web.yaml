        cruiseRecno: {type: integer}
        duration: {type: integer}
        numberOfDays: {type: integer}
        recno: {type: integer}
        sailingRecno: {type: integer}
        daysOrNights: {type: string}
        packageId: {type: string}
        cruiseLinePackageId: {type: string}
        currencyCode: {type: string}
        cruiseLineCode: {type: string}
        sabreShipCode: {type: string}
        cruiseLine:
