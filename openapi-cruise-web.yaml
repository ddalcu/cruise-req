        sailingDate: {type: string}
        sailingDepartureDate: {type: string}
        returnDate: {type: string}
        sailingReturnDate: {type: string}
        shipRatingClass: {type: string}
        has_ClubCruise: {type: boolean}
        pcc: {type: string}
        gdsRecno: {type: integer}
