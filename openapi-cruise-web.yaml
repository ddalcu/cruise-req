        itineraryDayList:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryDayList'
        cabinCategoryList:
          type: array
          items:
            $ref: '#/components/schemas/CabinCategoryList'
        purchaseTypeInfoList:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseTypeInfo'
        cabinCategoryNameList:
