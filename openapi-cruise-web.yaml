        name: {type: string}
        code: {type: string}
        description: {type: string}
        imageList:
          type: array
          items:
            $ref: '#/components/schemas/ImageList'
        cancellationPolicy:
          $ref: '#/components/schemas/CancellationPolicy'
        logo:
          $ref: '#/components/schemas/Logo'
        shipList:
          type: array
          items:
            $ref: '#/components/schemas/Ship'

    Ship:
      type: object
      properties:
        recno: {type: integer}
        rating: {type: number, format: double}
        shipRating: {type: number, format: double}
        name: {type: string}
        code: {type: string}
        description: {type: string}
        cruiseLineName: {type: string}
        cruiseLineRecno: {type: integer}
        imageList:
          type: array
          items:
            $ref: '#/components/schemas/ImageList'
        logo:
          $ref: '#/components/schemas/Logo'

    Destination:
